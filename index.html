function base64ToBlob(b64str, mime='image/png') {
  const bstr = atob(b64str);
  const n = bstr.length;
  const u8arr = new Uint8Array(n);
  for(let i=0; i<n; i++) u8arr[i] = bstr.charCodeAt(i);
  return URL.createObjectURL(new Blob([u8arr], {type:mime}));
}
