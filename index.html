window.__pvBootErrorHook = true;
window.addEventListener('error', function(e) {
  const msg = (e && (e.message || e.error && e.error.message)) || 'Unknown runtime error';
  console.error('Prismatic Veil runtime error:', msg, e);
});

(function(){
  const boot = document.getElementById('loading');
  function showBootError(err){
    console.error(err);
    if (!boot) return;
    boot.style.display = 'flex';
    boot.innerHTML = '<strong>Boot Error</strong>\n' +
      (err && (err.stack || err.message) ? (err.stack || err.message) : String(err)) +
      '\n\nMake sure index.html, phaser.min.js, and the sprite PNG files are all uploaded to the GitHub repo root.';
  }
  window.addEventListener('error', e => showBootError(e.error || e.message));
  window.addEventListener('unhandledrejection', e => showBootError(e.reason || e));
  window.PrismaticVeilBoot = { showBootError };
})();
if (!window.Phaser) { throw new Error('Phaser did not load. Check phaser.min.js path.'); }

function fadeOutMenuMusic(scene, duration = 550) {
  if (!gameState.titleMusic) return;
  if (!gameState.titleMusic.isPlaying) {
    gameState.titleMusic.stop();
    gameState.titleMusic.setVolume(0.45);
    return;
  }
  scene.tweens.add({
    targets: gameState.titleMusic,
    volume: 0,
    duration,
    onComplete: () => {
      if (gameState.titleMusic) {
        gameState.titleMusic.stop();
        gameState.titleMusic.setVolume(0.45);
      }
    }
  });
}

function stopMenuMusicNow() {
  if (gameState.titleMusic) {
    try {
      gameState.titleMusic.stop();
      gameState.titleMusic.setVolume(0.45);
    } catch(e) {}
  }
}

function getSpriteUrl(charKey) {
  return SPRITE_PATHS[charKey];
}
function loadHeroSprites(scene) {
  Object.keys(SPRITE_PATHS).forEach((charKey) => {
    if (!scene.textures.exists(charKey)) {
      scene.load.spritesheet(charKey, getSpriteUrl(charKey), {
        frameWidth: 224,
        frameHeight: 224
      });
    }
  });
}
function getAnimationFrames(scene, charKey, animKey) {
  const custom = CHARACTER_ANIM_SETS[charKey] && CHARACTER_ANIM_SETS[charKey][animKey];
  if (Array.isArray(custom) && custom.length) {
    return custom.map((frame) => ({ key: charKey, frame }));
  }
  return scene.anims.generateFrameNumbers(charKey, ANIM_FRAMES[animKey]);
}
function getAnimationRate(charKey, animKey) {
  const rates = CHARACTER_ANIM_RATES[charKey] || CHARACTER_ANIM_RATES.auryi;
  return rates[animKey] || 8;
}
function createHeroAnimations(scene, charKey) {
  if (scene.anims.exists(charKey + '_idle')) return;
  ['idle', 'walk', 'attack'].forEach((animKey) => {
    scene.anims.create({
      key: charKey + '_' + animKey,
      frames: getAnimationFrames(scene, charKey, animKey),
      frameRate: getAnimationRate(charKey, animKey),
      repeat: animKey === 'attack' ? 0 : -1
    });
  });
}

// SOUND FX — Synthesized chiptune beeps via Web Audio API
// ═══════════════════════════════════════════════════════
class SoundFX {
  constructor() {
    this.ctx = null;
    this.enabled = true;
    this.masterVolume = 0.78;
  }

  init() {
    if(!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  }

  makeGain(volume, startTime, duration, attack = 0.004) {
    const gain = this.ctx.createGain();
    const v = Math.max(0.0001, volume * this.masterVolume);
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.exponentialRampToValueAtTime(v, startTime + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    gain.connect(this.ctx.destination);
    return gain;
  }

  tone(freq, duration, type='square', volume=0.12, slideTo=null, delay=0, detune=0) {
    if(!this.enabled || (gameState && gameState.sfxEnabled === false)) return;
    this.init();
    const t = this.ctx.currentTime + delay;
    const osc = this.ctx.createOscillator();
    const gain = this.makeGain(volume, t, duration);
    osc.type = type;
    osc.detune.setValueAtTime(detune, t);
    osc.frequency.setValueAtTime(Math.max(20, freq), t);
    if(slideTo !== null) {
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + duration);
    }
    osc.connect(gain);
    osc.start(t);
    osc.stop(t + duration + 0.02);
  }

  noise(duration=0.08, volume=0.08, delay=0, filterFreq=900, filterType='bandpass', q=7) {
    if(!this.enabled || (gameState && gameState.sfxEnabled === false)) return;
    this.init();
    const t = this.ctx.currentTime + delay;
    const bufferSize = Math.max(1, Math.floor(this.ctx.sampleRate * duration));
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = filterType;
    filter.frequency.setValueAtTime(filterFreq, t);
    filter.Q.setValueAtTime(q, t);
    const gain = this.makeGain(volume, t, duration, 0.002);
    src.connect(filter);
    filter.connect(gain);
    src.start(t);
    src.stop(t + duration + 0.02);
  }

  attackPrismel() {
    this.tone(420, 0.11, 'triangle', 0.050, 780);
    this.tone(660, 0.09, 'square', 0.032, 1120, 0.015, -4);
    this.tone(1260, 0.08, 'sine', 0.020, 1700, 0.045);
    this.noise(0.05, 0.026, 0.018, 2400, 'highpass', 3);
  }

  attackKineza() {
    this.tone(78, 0.11, 'sawtooth', 0.17, 44);
    this.tone(148, 0.08, 'square', 0.10, 86, 0.006);
    this.noise(0.085, 0.075, 0.004, 760, 'bandpass', 5);
    this.tone(560, 0.045, 'triangle', 0.026, 320, 0.022);
  }

  attackAuryi() {
    this.tone(188, 0.20, 'sine', 0.048, 240);
    this.tone(392, 0.18, 'triangle', 0.050, 620, 0.018);
    this.tone(880, 0.15, 'sine', 0.032, 1240, 0.060);
    this.noise(0.11, 0.024, 0.025, 1600, 'bandpass', 3);
  }

  hit() {
    this.tone(150, 0.055, 'square', 0.08, 74);
    this.noise(0.04, 0.06, 0.004, 620, 'bandpass', 4);
  }

  enemyDeath() {
    this.tone(280, 0.08, 'sawtooth', 0.09, 130);
    this.noise(0.12, 0.065, 0.02, 500, 'lowpass', 2);
    this.tone(105, 0.10, 'square', 0.05, 52, 0.055);
  }

  gem() {
    this.tone(880, 0.045, 'triangle', 0.045, 1240);
    this.tone(1320, 0.040, 'sine', 0.032, 1860, 0.020);
  }

  playerHit() {
    this.tone(118, 0.13, 'sawtooth', 0.14, 58);
    this.noise(0.09, 0.08, 0.01, 430, 'bandpass', 5);
  }

  levelUp() {
    this.tone(392, 0.12, 'triangle', 0.08, 523);
    this.tone(523, 0.13, 'triangle', 0.08, 784, 0.10);
    this.tone(784, 0.18, 'sine', 0.09, 1175, 0.21);
    this.noise(0.18, 0.04, 0.11, 3000, 'highpass', 2);
  }

  select() {
    this.tone(420, 0.05, 'square', 0.07, 610);
    this.tone(960, 0.04, 'triangle', 0.028, 1280, 0.020);
  }

  cardReveal() {
    this.tone(330, 0.10, 'triangle', 0.05, 440);
    this.tone(660, 0.12, 'triangle', 0.04, 880, 0.06);
    this.noise(0.12, 0.025, 0.035, 2600, 'highpass', 2);
  }

  rareRelic() {
    this.tone(262, 0.12, 'sine', 0.06, 392);
    this.tone(523, 0.16, 'triangle', 0.06, 784, 0.10);
    this.tone(1046, 0.22, 'sine', 0.045, 1568, 0.18);
  }

  waveWarning() {
    this.tone(90, 0.16, 'sawtooth', 0.08, 72);
    this.tone(180, 0.16, 'square', 0.04, 144, 0.10);
  }

  battleTick() {
    if(!gameState.battleMusicEnabled) return;
    const step = Math.floor(performance.now() / 250) % 8;
    if(step === 0) this.tone(82, 0.055, 'square', 0.026, 78);
    if(step === 2) this.tone(123, 0.04, 'triangle', 0.018, 146);
    if(step === 4) this.tone(98, 0.055, 'square', 0.022, 74);
    if(step === 6) this.noise(0.035, 0.016, 0, 560, 'bandpass', 3);
  }

  gameOver() {
    this.tone(330, 0.18, 'sawtooth', 0.10, 210);
    this.tone(220, 0.22, 'sawtooth', 0.095, 120, 0.18);
    this.tone(110, 0.34, 'sine', 0.10, 55, 0.38);
    this.noise(0.24, 0.06, 0.12, 300, 'lowpass', 2);
  }
}

class TitleScene extends Phaser.Scene {
  constructor() {
    super('Title');
  }

  init() {
    gameState.titleStarted = false;
  }

  preload() {
    this.load.image('title_bg', TITLE_ASSETS.bg);
    this.load.audio('title_music', TITLE_ASSETS.music);
  }

  create() {
    this.cameras.main.setBackgroundColor('#07060f');

    const bg = this.add.image(GAME_W / 2, GAME_H / 2, 'title_bg');
    const scale = Math.max(GAME_W / bg.width, GAME_H / bg.height);
    bg.setScale(scale);
    bg.setDepth(0);

    // Dark veil overlay for text readability
    this.add.rectangle(0, 0, GAME_W, GAME_H, 0x03020a, 0.34)
      .setOrigin(0, 0)
      .setDepth(1);

    // Subtle bottom gradient panel
    this.add.rectangle(0, GAME_H - 160, GAME_W, 160, 0x03020a, 0.62)
      .setOrigin(0, 0)
      .setDepth(2);

    const crest = this.add.text(GAME_W / 2, 54, '✦ PRISMATIC VEIL ✦', {
      fontFamily: 'Georgia, serif',
      fontSize: '14px',
      fontStyle: 'bold',
      color: '#f7e8b6',
      stroke: '#180f29',
      strokeThickness: 3,
      align: 'center'
    }).setOrigin(0.5).setDepth(3).setAlpha(0.88);

    const prompt = this.add.text(GAME_W / 2, GAME_H - 98, 'TAP TO BEGIN', {
      fontFamily: 'Courier New',
      fontSize: '18px',
      fontStyle: 'bold',
      color: '#c8a8ff',
      stroke: '#000000',
      strokeThickness: 3
    }).setOrigin(0.5).setDepth(4);

    const tip = this.add.text(GAME_W / 2, GAME_H - 68, 'Music: Prism of Elders', {
      fontFamily: 'Courier New',
      fontSize: '10px',
      color: '#ffd56a',
      stroke: '#000000',
      strokeThickness: 2
    }).setOrigin(0.5).setDepth(4);

    this.add.text(8, GAME_H - 12, 'SURVIVAL WEAPON BATCH 07 HOTFIX 01', {
      fontFamily: 'Courier New',
      fontSize: '8px',
      color: '#7d68aa'
    }).setOrigin(0, 1).setDepth(4);

    this.tweens.add({
      targets: prompt,
      alpha: { from: 0.35, to: 1 },
      duration: 900,
      yoyo: true,
      repeat: -1
    });

    // Small drifting crystal motes
    this.motes = [];
    for (let i = 0; i < 24; i++) {
      const mote = this.add.star(
        Phaser.Math.Between(20, GAME_W - 20),
        Phaser.Math.Between(150, GAME_H - 180),
        4,
        2,
        Phaser.Math.Between(4, 8),
        Phaser.Display.Color.GetColor(
          Phaser.Math.Between(160, 255),
          Phaser.Math.Between(120, 240),
          255
        ),
        0.55
      ).setDepth(3);
      mote.speed = Phaser.Math.FloatBetween(4, 14);
      this.motes.push(mote);
    }

    const startGame = () => {
      if (gameState.titleStarted) return;
      gameState.titleStarted = true;
      try {
        if (!gameState.titleMusic) {
          gameState.titleMusic = this.sound.add('title_music', {
            loop: true,
            volume: 0.45
          });
          gameState.titleMusic.play();
        } else if (!gameState.titleMusic.isPlaying) {
          gameState.titleMusic.play();
        }
      } catch (err) {
        console.warn('Music could not start:', err);
      }

      if (gameState.titleMusic && gameState.titleMusic.isPlaying) {
        gameState.titleMusic.setVolume(0.45);
      }

      this.cameras.main.fadeOut(450, 7, 6, 15);
      this.time.delayedCall(470, () => {
        this.scene.start('CharacterSelect');
      });
    };

    this.input.once('pointerdown', startGame);
    if (this.input.keyboard) {
      this.input.keyboard.once('keydown', startGame);
    }
  }

  update(time, delta) {
    if (!this.motes) return;
    this.motes.forEach((mote, i) => {
      mote.y -= mote.speed * delta / 1000;
      mote.rotation += 0.01 + i * 0.0003;
      if (mote.y < 135) {
        mote.y = GAME_H - 175;
        mote.x = Phaser.Math.Between(20, GAME_W - 20);
      }
    });
  }
}

// CHARACTER SELECT SCENE
// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// MAIN BATTLE SCENE
// ═══════════════════════════════════════════════════════
class BattleScene extends Phaser.Scene {
  constructor() {
    super('Battle');
  }

  init() {
    // Reset run-specific state
    this.charData = CHARACTER_DATA[gameState.selectedCharacter];
    this.playerHp = 100;
    this.playerMaxHp = 100;
    this.playerLevel = 1;
    this.playerExp = 0;
    this.expToNext = 5;
    this.score = 0;
    this.killCount = 0;
    this.gameTime = 0;
    this.lastAttack = 0;
    this.invulnerable = false;
    this.attackDamageMult = 1;
    this.attackSpeedMult = 1;
    this.attackRangeMult = 1;
    this.moveSpeedMult = 1;
    this.spawnInterval = 1800;
    this.lastSpawn = 0;
    this.isPaused = false;
    this.gameOver = false;
    this.facingDir = {x:1, y:0};
    this.isAttacking = false;
    this.hitFreezeActive = false;
    this.heroFx = {};
    this.weapons = {};
    this.passives = {};
    this.evolutions = {};
    this.magnetBonus = 0;
    this.regenBonus = 0;
    this.orbiters = [];
    this.mines = this.physics ? null : null;
    this.lastMineDrop = 0;
    this.lastChainSpark = 0;
    this.lastBattleTick = 0;
    this.nextStagePhase = 1;
    this.eliteSpawned = {};
  }

  preload() {
    const charKey = gameState.selectedCharacter;
    if (!this.textures.exists(charKey)) {
      this.load.spritesheet(charKey, getSpriteUrl(charKey), {
        frameWidth: 224,
        frameHeight: 224
      });
    }
    loadCharacterArt(this, charKey);
  }

  create() {
    stopMenuMusicNow();
    if (this.sound) { try { this.sound.stopByKey('title_music'); } catch(e) {} }

    // ── Background ──
    this.bg = this.add.rectangle(0,0,GAME_W,GAME_H, COLORS.void).setOrigin(0,0);

    // Veil line down center (subtle, decorative)
    this.veilGraphics = this.add.graphics();

    // Stars
    this.stars = [];
    for(let i=0;i<40;i++) {
      const x = Math.random()*GAME_W;
      const y = Math.random()*GAME_H;
      const star = this.add.rectangle(x,y,1,1,COLORS.white).setAlpha(0.3);
      this.stars.push(star);
    }

    // ── Player ──
    const charKey = gameState.selectedCharacter;
    createHeroAnimations(this, charKey);

    this.player = this.add.sprite(GAME_W/2, GAME_H/2, charKey, 0);
    const tuning = getSpriteTuning(charKey);
    this.player.setOrigin(tuning.originX, tuning.originY);
    this.player.setScale(tuning.battleScale);
    this.player.play(charKey + '_idle');
    this.player.setDepth(10);

    this.physics.world.enable(this.player);
    const bodyTuning = getBodyTuning(charKey);
    this.player.body.setSize(bodyTuning.w, bodyTuning.h);
    this.player.body.setOffset(bodyTuning.offX, bodyTuning.offY);
    this.player.body.setCollideWorldBounds(true);

    this.currentAnim = 'idle';
    this.createHeroEffects();
    this.isMoving = false;

    // ── Groups ──
    this.enemies = this.physics.add.group();
    this.projectiles = this.physics.add.group();
    this.expGems = this.physics.add.group();
    this.mines = this.physics.add.group();
    this.damageTexts = [];

    this.setupWeaponSystem();

    // ── Collisions ──
    this.physics.add.overlap(this.player, this.enemies, this.onPlayerHit, null, this);
    this.physics.add.overlap(this.projectiles, this.enemies, this.onProjectileHit, null, this);
    this.physics.add.overlap(this.mines, this.enemies, this.onMineHit, null, this);
    this.physics.add.overlap(this.player, this.expGems, this.onGemCollect, null, this);

    // ── Input ──
    this.cursors = this.input.keyboard ? this.input.keyboard.createCursorKeys() : null;
    this.wasd = this.input.keyboard ? this.input.keyboard.addKeys('W,A,S,D') : null;

    // Touch/joystick for mobile
    this.touchTarget = null;
    this.input.on('pointerdown', (pointer) => {
      if(this.upgradeMenuOpen) return;
      this.touchTarget = {x: pointer.x, y: pointer.y};
    });
    this.input.on('pointermove', (pointer) => {
      if(this.touchTarget && pointer.isDown) {
        this.touchTarget = {x: pointer.x, y: pointer.y};
      }
    });
    this.input.on('pointerup', () => {
      this.touchTarget = null;
    });

    // ── UI ──
    this.createUI();

    this.levelHint = this.add.text(GAME_W/2, 110, 'Collect resonance orbs to reveal relic cards', {
      fontFamily:'Trebuchet MS, Arial, sans-serif',
      fontSize:'13px',
      fontStyle:'bold',
      color:'#eddcff',
      stroke:'#000000',
      strokeThickness:3
    }).setOrigin(0.5).setAlpha(0.85);
    this.time.delayedCall(6500, () => {
      if(this.levelHint) {
        this.tweens.add({targets:this.levelHint, alpha:0, duration:700, onComplete:()=>this.levelHint.destroy()});
      }
    });
    this.time.delayedCall(700, () => this.showStageMessage('The First Veil opens.'));

    // ── Aura visual for Auryi ──
    if(gameState.selectedCharacter === 'auryi') {
      this.auraGraphics = this.add.graphics();
    }
  }

  createHeroEffects() {
    const charKey = gameState.selectedCharacter;
    this.heroFx = {};

    if(charKey === 'prismel') {
      const glow = this.add.circle(0, 0, 13, 0x66ccff, 0.18);
      const halo = this.add.circle(0, 0, 17, 0xffffff, 0).setStrokeStyle(2, 0xa879ff, 0.50);
      const outer = this.add.rectangle(0, 0, 14, 14, 0x79b8ff, 0.95).setAngle(45).setStrokeStyle(2, 0xffffff, 0.75);
      const inner = this.add.rectangle(0, 0, 8, 8, 0xff66ff, 0.95).setAngle(45);
      const core = this.add.rectangle(0, 0, 4, 4, 0xffffff, 0.95).setAngle(45);
      const crystal = this.add.container(this.player.x, this.player.y - 46, [glow, halo, outer, inner, core]).setDepth(16);
      this.heroFx.prismel = { crystal, glow, halo, outer, inner, core, burstLock: false };
    }
    else if(charKey === 'auryi') {
      const glow = this.add.circle(0, 0, 15, COLORS.yellow, 0.14);
      const ring = this.add.circle(0, 0, 11, COLORS.white, 0).setStrokeStyle(2, COLORS.yellow, 0.70);
      const core = this.add.circle(0, 0, 7, 0xffdf88, 0.98);
      const shine = this.add.circle(-2, -2, 3, 0xffffff, 0.92);
      const orb = this.add.container(this.player.x, this.player.y - 54, [glow, ring, core, shine]).setDepth(16);
      this.heroFx.auryi = { orb, glow, ring, core, shine, burstLock: false };
    }
    else if(charKey === 'kineza') {
      const leftGlow = this.add.circle(this.player.x, this.player.y, 10, COLORS.green, 0.0).setDepth(14).setStrokeStyle(2, COLORS.yellow, 0.0);
      const rightGlow = this.add.circle(this.player.x, this.player.y, 12, COLORS.green, 0.0).setDepth(14).setStrokeStyle(2, COLORS.yellow, 0.0);
      this.heroFx.kineza = { leftGlow, rightGlow, burstLock: false };
    }
  }

  updateHeroEffects(delta) {
    if(!this.player || !this.heroFx) return;
    const t = this.time.now * 0.004;
    const side = this.player.flipX ? -1 : 1;

    if(this.heroFx.prismel) {
      const fx = this.heroFx.prismel;
      const baseX = this.player.x + side * 18;
      const baseY = this.player.y - 58;
      const targetX = baseX + side * (10 + Math.cos(t) * 8);
      const targetY = baseY + Math.sin(t * 1.3) * 7;
      fx.crystal.x = Phaser.Math.Linear(fx.crystal.x, targetX, 0.22);
      fx.crystal.y = Phaser.Math.Linear(fx.crystal.y, targetY, 0.22);
      fx.crystal.rotation += 0.015;
      const pulse = 1 + Math.sin(t * 1.8) * 0.08;
      fx.crystal.setScale(pulse);
      const spectrum = [0xff5a7a, 0xffcc55, 0x7dff8d, 0x7dc8ff, 0xc68bff];
      const idx = Math.floor((this.time.now / 180) % spectrum.length);
      const next = spectrum[idx];
      const innerNext = spectrum[(idx + 2) % spectrum.length];
      fx.outer.setFillStyle(next, 0.95);
      fx.inner.setFillStyle(innerNext, 0.95);
      fx.glow.setFillStyle(next, 0.16);
      fx.halo.setStrokeStyle(2, innerNext, 0.45 + Math.sin(t * 1.7) * 0.12);
    }

    if(this.heroFx.auryi) {
      const fx = this.heroFx.auryi;
      const baseX = this.player.x + side * 26;
      const baseY = this.player.y - 54;
      const targetX = baseX + side * (Math.cos(t * 0.8) * 4);
      const targetY = baseY + Math.sin(t * 1.1) * 6;
      fx.orb.x = Phaser.Math.Linear(fx.orb.x, targetX, 0.18);
      fx.orb.y = Phaser.Math.Linear(fx.orb.y, targetY, 0.18);
      const pulse = 1 + Math.sin(t * 1.4) * 0.10;
      fx.orb.setScale(pulse);
      fx.glow.setFillStyle(COLORS.yellow, 0.11 + Math.sin(t * 1.4) * 0.03);
      fx.ring.setStrokeStyle(2, COLORS.yellow, 0.55 + Math.sin(t * 1.9) * 0.15);
    }

    if(this.heroFx.kineza) {
      const fx = this.heroFx.kineza;
      const moveBoost = this.isMoving ? 0.08 : 0.0;
      const alpha = 0.12 + Math.sin(t * 2.4) * 0.05 + moveBoost;
      const rightX = this.player.x + side * 24;
      const rightY = this.player.y - 44;
      const leftX = this.player.x - side * 10;
      const leftY = this.player.y - 40;
      fx.rightGlow.x = rightX; fx.rightGlow.y = rightY;
      fx.leftGlow.x = leftX; fx.leftGlow.y = leftY;
      fx.rightGlow.setFillStyle(COLORS.green, alpha);
      fx.leftGlow.setFillStyle(COLORS.green, alpha * 0.85);
      fx.rightGlow.setStrokeStyle(2, COLORS.yellow, alpha * 0.75);
      fx.leftGlow.setStrokeStyle(2, COLORS.yellow, alpha * 0.60);
    }
  }

  triggerHeroFocusBurst(kind) {
    if(kind === 'prismel' && this.heroFx.prismel && !this.heroFx.prismel.burstLock) {
      const fx = this.heroFx.prismel;
      fx.burstLock = true;
      this.tweens.add({
        targets: fx.crystal,
        scaleX: 1.48,
        scaleY: 1.48,
        duration: 90,
        yoyo: true,
        onComplete: () => { fx.burstLock = false; }
      });
    }
    else if(kind === 'auryi' && this.heroFx.auryi && !this.heroFx.auryi.burstLock) {
      const fx = this.heroFx.auryi;
      fx.burstLock = true;
      this.tweens.add({
        targets: fx.orb,
        scaleX: 1.42,
        scaleY: 1.42,
        duration: 120,
        yoyo: true,
        onComplete: () => { fx.burstLock = false; }
      });
    }
    else if(kind === 'kineza' && this.heroFx.kineza && !this.heroFx.kineza.burstLock) {
      const fx = this.heroFx.kineza;
      fx.burstLock = true;
      [fx.leftGlow, fx.rightGlow].forEach(glow => {
        this.tweens.add({
          targets: glow,
          scaleX: 1.45,
          scaleY: 1.45,
          alpha: 0,
          duration: 110,
          yoyo: true
        });
      });
      this.time.delayedCall(120, () => { fx.burstLock = false; });
    }
  }

  drawPlayerSprite() {
    const g = this.playerGraphics;
    g.clear();
    const charKey = gameState.selectedCharacter;
    const bob = Math.sin(this.time.now*0.005)*2;

    if(charKey === 'prismel') {
      g.fillStyle(0x1a1560);
      g.fillRoundedRect(-14, -5+bob, 28, 30, 6);
      g.fillStyle(0x0a0830);
      g.fillCircle(0, -14+bob, 13);
      g.lineStyle(2, COLORS.gold);
      g.strokeRoundedRect(-14, -5+bob, 28, 30, 6);
      g.fillStyle(0x88aaff);

  }

  update(time, delta) {
    if(this.gameOver || this.upgradeMenuOpen || this.hitFreezeActive) return;

    this.gameTime += delta;
    this.updateTimer();
    this.updateMovement(delta);
    this.updatePlayerSprite();
    this.updateHeroEffects(delta);
    this.updateAttack(time);
    this.updateWeapons(time, delta);
    this.updateEnemies(time, delta);
    this.spawnEnemies(time);
    this.updateProjectiles(delta);
    this.updateMines(delta);
    this.updateExpGems(delta);
    this.updateDamageTexts(delta);
    this.updateVeil();
    this.updateUI();
    this.updateStagePhase(time);
    this.updateBattleAudio(time);

    if(gameState.selectedCharacter === 'auryi') {
      this.updateAura();
    }
  }

  setupWeaponSystem() {
    const hero = gameState.selectedCharacter;
    const baseMap = {
      prismel: 'prismShard',
      kineza: 'kineticDrive',
      auryi: 'auraPulse'
    };
    this.weapons[baseMap[hero]] = { level: 1, cooldown: 0 };
    this.weaponCooldowns = {
      prismOrbit: 0,
      veilMine: 0,
      chainSpark: 0
    };
  }

  getWeaponLevel(key) {
    return this.weapons[key] ? this.weapons[key].level : 0;
  }

  upgradeWeapon(key) {
    const def = WEAPON_DEFS[key];
    if(!def) return;
    if(!this.weapons[key]) {
      this.weapons[key] = { level: 1, cooldown: 0 };
    } else {
      this.weapons[key].level = Math.min(def.maxLevel, this.weapons[key].level + 1);
    }
    if(key === 'prismOrbit') this.rebuildOrbiters();
  }

  addPassive(name) {
    this.passives[name] = (this.passives[name] || 0) + 1;
    if(name === 'Magnet Charm') this.magnetBonus = (this.magnetBonus || 0) + 40;
    if(name === 'Vital Thread') {
      this.playerMaxHp += 15;
      this.playerHp = Math.min(this.playerMaxHp, this.playerHp + 15);
    }
    if(name === 'Quickened Veil') this.attackSpeedMult *= 1.08;
    if(name === 'Spectrum Lens') this.attackRangeMult *= 1.08;
    if(name === 'Momentum Core') this.moveSpeedMult *= 1.08;
    if(name === 'Golden Halo') this.regenBonus = (this.regenBonus || 0) + 0.006;
  }

  tryEvolutions() {
    if(gameState.selectedCharacter === 'prismel' &&
       this.getWeaponLevel('prismShard') >= 4 &&
       this.passives['Spectrum Lens'] &&
       !this.evolutions.prismaticBarrage) {
      this.evolutions.prismaticBarrage = true;
      this.showStageMessage('EVOLUTION: PRISMATIC BARRAGE');
      sfx.rareRelic();
    }
    if(gameState.selectedCharacter === 'kineza' &&
       this.getWeaponLevel('kineticDrive') >= 4 &&
       this.passives['Momentum Core'] &&
       !this.evolutions.breakerDash) {
      this.evolutions.breakerDash = true;
      this.showStageMessage('EVOLUTION: BREAKER DASH');
      sfx.rareRelic();
    }
    if(gameState.selectedCharacter === 'auryi' &&
       this.getWeaponLevel('auraPulse') >= 4 &&
       this.passives['Golden Halo'] &&
       !this.evolutions.radiantSanctuary) {
      this.evolutions.radiantSanctuary = true;
      this.showStageMessage('EVOLUTION: RADIANT SANCTUARY');
      sfx.rareRelic();
    }
  }

  updateWeapons(time, delta) {
    if(!this.weapons) return;
    const orbitLevel = this.getWeaponLevel('prismOrbit');
    if(orbitLevel > 0) this.updateOrbiters(time, orbitLevel);

    const mineLevel = this.getWeaponLevel('veilMine');
    if(mineLevel > 0) this.dropVeilMine(time, mineLevel);

    const chainLevel = this.getWeaponLevel('chainSpark');
    if(chainLevel > 0) this.fireChainSpark(time, chainLevel);

    if(this.regenBonus && !this.gameOver) {
      this.playerHp = Math.min(this.playerMaxHp, this.playerHp + this.regenBonus * delta);
    }
  }

  rebuildOrbiters() {
    this.orbiters.forEach(o => o.destroy());
    this.orbiters = [];
    const level = this.getWeaponLevel('prismOrbit');
    const count = Math.min(5, level + 1);
    for(let i=0; i<count; i++) {
      const color = [COLORS.blue, COLORS.violet, COLORS.green, COLORS.yellow, COLORS.red][i % 5];
      const orb = this.add.container(this.player.x, this.player.y).setDepth(12);
      const g = this.add.rectangle(0, 0, 10, 10, color, 0.95).setAngle(45).setStrokeStyle(1, COLORS.white, 0.6);
      const glow = this.add.circle(0, 0, 12, color, 0.14);
      orb.add([glow, g]);
      orb.weaponIndex = i;
      this.orbiters.push(orb);
    }
  }

  updateOrbiters(time, level) {
    const radius = 42 + level * 6;
    const speed = 0.0022 + level * 0.00025;
    this.orbiters.forEach((orb, i) => {
      const a = time * speed + (Math.PI * 2 / this.orbiters.length) * i;
      orb.x = this.player.x + Math.cos(a) * radius;
      orb.y = this.player.y + Math.sin(a) * radius * 0.75;
      orb.rotation += 0.04;
      this.enemies.getChildren().forEach(e => {
        if(e.active && Phaser.Math.Distance.Between(orb.x, orb.y, e.x, e.y) < 24) {
          this.damageEnemy(e, 0.035 * level * this.charData.baseDamage);
        }
      });
    });
  }

  dropVeilMine(time, level) {
    const cooldown = Math.max(650, 1900 - level * 220);
    if(time - this.lastMineDrop < cooldown) return;
    this.lastMineDrop = time;

    const ring = this.add.circle(0, 0, 13 + level * 2, COLORS.violet, 0.12).setStrokeStyle(2, COLORS.lavender, 0.7);
    const core = this.add.graphics();
    core.fillStyle(COLORS.lavender, 0.92);
    core.fillRect(-3, -9-level, 6, 18 + level*2);
    core.fillRect(-9-level, -3, 18 + level*2, 6);
    core.fillStyle(COLORS.white, 0.55);
    core.fillCircle(0, 0, 3);
    const mine = this.add.container(this.player.x, this.player.y + 4, [ring, core]).setDepth(4);
    this.physics.world.enable(mine);
    if(mine.body) {
      mine.body.setSize(30 + level * 4, 30 + level * 4);
      mine.body.setOffset(-(15 + level * 2), -(15 + level * 2));
    }
    mine.damage = (8 + level * 3) * this.attackDamageMult;
    mine.lifetime = 4200;
    mine.mineLevel = level;
    this.mines.add(mine);
  }

  fireChainSpark(time, level) {
    const cooldown = Math.max(700, 1500 - level * 160);
    if(time - this.lastChainSpark < cooldown) return;
    this.lastChainSpark = time;
    const enemies = this.enemies.getChildren().filter(e => e.active);
    if(enemies.length < 1) return;
    enemies.sort((a,b) =>
      Phaser.Math.Distance.Between(this.player.x,this.player.y,a.x,a.y) -
      Phaser.Math.Distance.Between(this.player.x,this.player.y,b.x,b.y)
    );
    const maxJumps = Math.min(4, level + 1);
    let lastX = this.player.x, lastY = this.player.y;
    for(let i=0; i<Math.min(maxJumps, enemies.length); i++) {
      const e = enemies[i];
      const bolt = this.add.graphics().setDepth(18);
      bolt.lineStyle(2, COLORS.blue, 0.88);
      bolt.beginPath();
      bolt.moveTo(lastX,lastY);
      bolt.lineTo(e.x,e.y);
      bolt.strokePath();
      this.tweens.add({targets: bolt, alpha: 0, duration: 130, onComplete:()=>bolt.destroy()});
      this.damageEnemy(e, (5 + level * 2) * this.attackDamageMult);
      lastX = e.x; lastY = e.y;
    }
  }

  updateMines(delta) {
    if(!this.mines || !this.mines.getChildren) return;
    this.mines.getChildren().forEach(m => {
      m.lifetime -= delta;
      m.rotation += 0.015;
      if(m.lifetime <= 0) {
        this.detonateMine(m);
      }
    });
  }

  detonateMine(mine) {
    if(!mine || !mine.active) return;
    const radius = 48 + mine.mineLevel * 8;
    const ring = this.add.circle(mine.x, mine.y, 12, COLORS.violet, 0).setStrokeStyle(4, COLORS.lavender, 0.85);
    this.tweens.add({
      targets: ring,
      radius,
      alpha: 0,
      duration: 220,
      onComplete: () => ring.destroy()
    });
    this.enemies.getChildren().forEach(e => {
      if(e.active && Phaser.Math.Distance.Between(mine.x, mine.y, e.x, e.y) < radius) {
        this.damageEnemy(e, mine.damage);
      }
    });
    mine.destroy();
  }

  updateStagePhase(time) {
    const elapsed = this.gameTime / 1000;
    if(this.nextStagePhase < STAGE_PHASES.length && elapsed >= STAGE_PHASES[this.nextStagePhase].time) {
      const phase = STAGE_PHASES[this.nextStagePhase];
      this.showStageMessage(phase.msg);
      sfx.waveWarning();
      this.nextStagePhase++;
    }
  }

  showStageMessage(msg) {
    const t = this.add.text(GAME_W/2, 136, msg, {
      fontFamily:'Georgia, serif',
      fontSize:'18px',
      fontStyle:'bold',
      color:'#f7e8b6',
      stroke:'#000000',
      strokeThickness:4
    }).setOrigin(0.5).setDepth(2200);
    this.tweens.add({targets:t, y:t.y-20, alpha:0, duration:1600, onComplete:()=>t.destroy()});
  }

  updateBattleAudio(time) {
    if(time - this.lastBattleTick > 250) {
      this.lastBattleTick = time;
      sfx.battleTick();
    }
  }

  updateTimer() {
    const totalSec = Math.floor(this.gameTime / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    this.timerText.setText(`${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`);
  }

  spawnDamageText(x, y, amount, color) {
    const colorHex = '#' + color.toString(16).padStart(6, '0');
    const text = this.add.text(x, y, '-' + amount, {
      fontFamily: 'Georgia, serif', fontSize: '12px', fontStyle: 'bold', color: colorHex
    }).setOrigin(0.5).setDepth(50);
    this.damageTexts.push({ text, life: 500, vy: -0.5 });
  }

  updateDamageTexts(delta) {
    this.damageTexts = this.damageTexts.filter(dt => {
      dt.life -= delta;
      dt.text.y += dt.vy;
      dt.text.setAlpha(dt.life / 500);
      if (dt.life <= 0) { dt.text.destroy(); return false; }
      return true;
    });
  }

  updateVeil() {
    this.veilGraphics.clear();
    const t = this.time.now*0.001;
    const veilX = GAME_W/2 + Math.sin(t*0.5)*10;
    this.veilGraphics.lineStyle(1, COLORS.white, 0.1+Math.sin(t)*0.05);
    this.veilGraphics.beginPath();
    this.veilGraphics.moveTo(veilX, 0);
    this.veilGraphics.lineTo(veilX, GAME_H);
    this.veilGraphics.strokePath();
  }

  updateMovement(delta) {
    let dx=0, dy=0;
    const speed = this.charData.moveSpeed * this.moveSpeedMult;

    if(this.cursors) {
      if(this.cursors.left.isDown || (this.wasd && this.wasd.A.isDown)) dx=-1;
      if(this.cursors.right.isDown || (this.wasd && this.wasd.D.isDown)) dx=1;
      if(this.cursors.up.isDown || (this.wasd && this.wasd.W.isDown)) dy=-1;
      if(this.cursors.down.isDown || (this.wasd && this.wasd.S.isDown)) dy=1;
    }

    // Touch movement - move toward touch point
    if(this.touchTarget) {
      const tdx = this.touchTarget.x - this.player.x;
      const tdy = this.touchTarget.y - this.player.y;
      const dist = Math.sqrt(tdx*tdx+tdy*tdy);
      if(dist > 5) {
        dx = tdx/dist;
        dy = tdy/dist;
      }
    }

    const len = Math.sqrt(dx*dx+dy*dy);
    if(len>0) {
      dx/=len; dy/=len;
      if(this.player.body) this.player.body.setVelocity(dx*speed, dy*speed);
      this.facingDir = {x:dx,y:dy};
      this.isMoving = true;
      // Flip sprite based on horizontal direction (sprites face right by default)
      if(dx < -0.1) this.player.setFlipX(true);
      else if(dx > 0.1) this.player.setFlipX(false);
    } else {
      if(this.player.body) this.player.body.setVelocity(0,0);
      this.isMoving = false;
    }
  }

  updatePlayerSprite() {
    if (this.isAttacking) return;
    const charKey = gameState.selectedCharacter;
    const targetAnim = this.isMoving ? 'walk' : 'idle';
    if (this.currentAnim !== targetAnim) {
      this.currentAnim = targetAnim;
      this.player.play(charKey + '_' + targetAnim, true);
    }
  }

  updateAttack(time) {
    const interval = this.charData.attackSpeed / this.attackSpeedMult;
    if(time - this.lastAttack < interval) return;

    // Find nearest enemy
    const enemies = this.enemies.getChildren();
    if(enemies.length === 0) return;

    let nearest = null, nearestDist = Infinity;
    enemies.forEach(e => {
      const d = Phaser.Math.Distance.Between(this.player.x, this.player.y, e.x, e.y);
      if(d < nearestDist) { nearestDist = d; nearest = e; }
    });

    const range = this.charData.attackRange * this.attackRangeMult;
    if(nearestDist > range) return;

    this.lastAttack = time;
    this.playHeroAttackAnim();

    if(gameState.selectedCharacter === 'prismel') {
      this.triggerHeroFocusBurst('prismel');
      const lvl = this.getWeaponLevel('prismShard');
      this.firePrismProjectile(nearest);
      if(lvl >= 2 || this.evolutions.prismaticBarrage) {
        const extras = this.evolutions.prismaticBarrage ? [-0.35, -0.18, 0.18, 0.35] : [-0.18, 0.18];
        extras.forEach(offset => this.firePrismProjectile(nearest, offset));
      }
      sfx.attackPrismel();
    }
    else if(gameState.selectedCharacter === 'kineza') {
      this.triggerHeroFocusBurst('kineza');
      this.kinezaMeleeStrike(nearest, range + this.getWeaponLevel('kineticDrive')*6, nearestDist);
      if(this.evolutions.breakerDash) {
        this.time.delayedCall(115, () => {
          if(this.gameOver || !this.enemies || !this.player || !this.player.active) return;
          const next = this.enemies.getChildren().find(e => e.active && Phaser.Math.Distance.Between(this.player.x,this.player.y,e.x,e.y) < range + 90);
          if(next) this.kinezaMeleeStrike(next, range + 20, Phaser.Math.Distance.Between(this.player.x,this.player.y,next.x,next.y));
        });
      }
      sfx.attackKineza();
    }
    else if(gameState.selectedCharacter === 'auryi') {
      this.triggerHeroFocusBurst('auryi');
      this.auryiAuraPulse(range + this.getWeaponLevel('auraPulse')*10);
      sfx.attackAuryi();
    }
  }

  playHeroAttackAnim() {
    const charKey = gameState.selectedCharacter;
    this.isAttacking = true;
    this.currentAnim = 'attack';
    this.player.play(charKey + '_attack', true);
    this.player.once(Phaser.Animations.Events.ANIMATION_COMPLETE, () => {
      this.isAttacking = false;
      this.currentAnim = '';
      this.updatePlayerSprite();
    });
  }

  firePrismProjectile(target, angleOffset = 0) {
    const startX = this.heroFx.prismel ? this.heroFx.prismel.crystal.x : this.player.x;
    const startY = this.heroFx.prismel ? this.heroFx.prismel.crystal.y : this.player.y - 30;
    const angle = Phaser.Math.Angle.Between(startX, startY, target.x, target.y) + angleOffset;
    const colors = [COLORS.red, COLORS.orange, COLORS.yellow, COLORS.green, COLORS.blue, COLORS.violet];
    const color = colors[Math.floor(Math.random()*colors.length)];

    const glow = this.add.circle(0, 0, 11, color, 0.22);
    const ring = this.add.circle(0, 0, 15, color, 0).setStrokeStyle(2, color, 0.55);
    const crystal = this.add.rectangle(0, 0, 12, 12, color, 0.98).setAngle(45).setStrokeStyle(2, 0xffffff, 0.70);
    const core = this.add.rectangle(0, 0, 5, 5, 0xffffff, 0.95).setAngle(45);

    const container = this.add.container(startX, startY, [glow, ring, crystal, core]);
    this.physics.world.enable(container);
    const speed = this.charData.projectileSpeed;
    if(container.body) {
      container.body.setSize(18,18);
      container.body.setOffset(-9,-9);
      container.body.setVelocity(Math.cos(angle)*speed, Math.sin(angle)*speed);
    }
    container.damage = this.charData.baseDamage * this.attackDamageMult;
    container.rotation = angle;
    container.lifetime = 1800;
    container.prismProjectile = true;

    this.tweens.add({
      targets: [crystal, core],
      angle: '+=360',
      duration: 380,
      repeat: -1
    });
    this.tweens.add({
      targets: ring,
      scaleX: 1.3,
      scaleY: 1.3,
      alpha: 0.18,
      duration: 180,
      yoyo: true,
      repeat: -1
    });

    for(let i=0;i<3;i++) {
      const shard = this.add.rectangle(startX - Math.cos(angle)*(8 + i*6), startY - Math.sin(angle)*(8 + i*6), 8 - i*2, 8 - i*2, color, 0.16 - i*0.03).setAngle(45);
      this.tweens.add({
        targets: shard,
        alpha: 0,
        scaleX: 0.5,
        scaleY: 0.5,
        duration: 180 + i*30,
        onComplete: () => shard.destroy()
      });
    }

    this.projectiles.add(container);
  }

  kinezaMeleeStrike(target, range, nearestDist) {
    if(!target || !target.active) return;
    const startX = this.player.x;
    const startY = this.player.y;
    const angle = Phaser.Math.Angle.Between(startX, startY, target.x, target.y);
    const dirX = Math.cos(angle);
    const dirY = Math.sin(angle);

    // Face left/right only; this prevents side-view art from fighting diagonal motion too much.
    if(dirX < -0.12) this.player.setFlipX(true);
    else if(dirX > 0.12) this.player.setFlipX(false);

    const dashDist = Math.min(52, Math.max(28, nearestDist - 8));
    const dashX = Phaser.Math.Clamp(startX + dirX * dashDist, 28, GAME_W - 28);
    const dashY = Phaser.Math.Clamp(startY + dirY * dashDist, 92, GAME_H - 34);

    // Kinetic afterimage trail
    for(let i=0;i<3;i++) {
      const frameName = (this.player.frame && this.player.frame.name != null) ? this.player.frame.name : 0;
      const ghost = this.add.sprite(startX - dirX*(i*7), startY - dirY*(i*5), gameState.selectedCharacter, frameName)
        .setOrigin(this.player.originX, this.player.originY)
        .setScale(this.player.scaleX, this.player.scaleY)
        .setAlpha(0.18 - i*0.04)
        .setTint(0x66ff44)
        .setDepth(this.player.depth - 1);
      ghost.setFlipX(this.player.flipX);
      this.tweens.add({
        targets: ghost,
        alpha: 0,
        duration: 130 + i*35,
        onComplete: () => ghost.destroy()
      });
    }

    const streak = this.add.graphics();
    streak.lineStyle(8, COLORS.green, 0.42);
    streak.beginPath();
    streak.moveTo(startX - dirX*8, startY - dirY*8);
    streak.lineTo(dashX + dirX*24, dashY + dirY*18);
    streak.strokePath();
    streak.lineStyle(3, COLORS.yellow, 0.58);
    streak.beginPath();
    streak.moveTo(startX, startY);
    streak.lineTo(dashX + dirX*20, dashY + dirY*14);
    streak.strokePath();

    this.tweens.add({
      targets: streak,
      alpha: 0,
      duration: 150,
      onComplete: () => streak.destroy()
    });

    // Dash body instead of polite standing punch
    this.tweens.add({
      targets: this.player,
      x: dashX,
      y: dashY,
      duration: 82,
      ease: 'Quad.easeOut',
      onComplete: () => {
        if(this.gameOver || !this.enemies || !this.player || !this.player.active) return;
        let hitCount = 0;
        const enemies = this.enemies.getChildren().slice();
        enemies.forEach(e => {
          if(!e.active) return;
          const dx = e.x - this.player.x;
          const dy = e.y - this.player.y;
          const d = Math.sqrt(dx*dx + dy*dy);
          if(d > range + 24) return;

          const enemyAngle = Math.atan2(dy, dx);
          const diff = Phaser.Math.Angle.Wrap(enemyAngle - angle);

          // Wider than a punch, narrower than a full circle: a kinetic shoulder-check zone.
          if(Math.abs(diff) <= 1.05 || d < 34) {
            hitCount++;
            this.damageEnemy(e, this.charData.baseDamage * this.attackDamageMult);

            if(e.body && e.body.setVelocity) {
              e.body.setVelocity(dirX * 250, dirY * 250);
            }

            const impact = this.add.circle(e.x, e.y, 10, COLORS.green, 0.22).setStrokeStyle(4, COLORS.yellow, 0.92);
            const burst = this.add.graphics();
            burst.lineStyle(3, COLORS.green, 0.8);
            for(let k=0;k<8;k++) {
              const a = (Math.PI*2/8)*k;
              burst.beginPath();
              burst.moveTo(e.x, e.y);
              burst.lineTo(e.x + Math.cos(a)*22, e.y + Math.sin(a)*22);
              burst.strokePath();
            }

            this.tweens.add({
              targets: [impact, burst],
              alpha: 0,
              scale: 1.45,
              duration: 135,
              onComplete: () => { impact.destroy(); burst.destroy(); }
            });
          }
        });

        if(hitCount > 0) {
          this.hitFreeze(30);
          this.cameras.main.shake(70, 0.0022);
        }
      }
    });
  }

  hitFreeze(duration = 42) {
    if(this.hitFreezeActive || this.upgradeMenuOpen || this.gameOver) return;
    this.hitFreezeActive = true;
    if(this.physics && this.physics.world) this.physics.pause();
    if(this.player && this.player.anims) this.player.anims.pause();

    this.time.delayedCall(duration, () => {
      this.hitFreezeActive = false;
      if(!this.upgradeMenuOpen && !this.gameOver && this.physics && this.physics.world) this.physics.resume();
      if(this.player && this.player.anims) this.player.anims.resume();
    });
  }

  auryiAuraPulse(range) {
    if(this.heroFx.auryi) {
      this.tweens.add({
        targets: this.heroFx.auryi.orb,
        angle: '+=45',
        duration: 140
      });
    }
    // Visual pulse - double ring for impact
    const ring1 = this.add.circle(this.player.x, this.player.y, 10, COLORS.lavender, 0);
    ring1.setStrokeStyle(5, COLORS.lavender, 0.9);

    const ring2 = this.add.circle(this.player.x, this.player.y, 10, COLORS.yellow, 0);
    ring2.setStrokeStyle(3, COLORS.yellow, 0.7);

    // Fill flash
    const flash = this.add.circle(this.player.x, this.player.y, 10, COLORS.lavender, 0.15);

    this.tweens.add({
      targets: ring1,
      radius: range,
      alpha: 0,
      duration: 350,
      ease: 'Cubic.easeOut',
      onUpdate: () => ring1.setStrokeStyle(5, COLORS.lavender, ring1.alpha),
      onComplete: () => ring1.destroy()
    });

    this.tweens.add({
      targets: ring2,
      radius: range*0.85,
      alpha: 0,
      duration: 300,
      delay: 60,
      ease: 'Cubic.easeOut',
      onUpdate: () => ring2.setStrokeStyle(3, COLORS.yellow, ring2.alpha),
      onComplete: () => ring2.destroy()
    });

    this.tweens.add({
      targets: flash,
      radius: range,
      alpha: 0,
      duration: 250,
      onComplete: () => flash.destroy()
    });

    const enemies = this.enemies.getChildren().slice();
    enemies.forEach(e => {
      const d = Phaser.Math.Distance.Between(this.player.x,this.player.y,e.x,e.y);
      if(d <= range) {
        this.damageEnemy(e, this.charData.baseDamage * this.attackDamageMult);
      }
    });
    if(this.evolutions.radiantSanctuary) {
      this.playerHp = Math.min(this.playerMaxHp, this.playerHp + 4);
      const field = this.add.circle(this.player.x, this.player.y, range*0.45, COLORS.yellow, 0.08).setStrokeStyle(2, COLORS.yellow, 0.18);
      this.tweens.add({targets: field, alpha: 0, duration: 1000, onComplete:()=>field.destroy()});
    }
  }

  updateAura() {
    if(!this.auraGraphics) return;
    this.auraGraphics.clear();
    const range = this.charData.attackRange * this.attackRangeMult;
    this.auraGraphics.lineStyle(1, COLORS.yellow, 0.1);
    this.auraGraphics.strokeCircle(this.player.x, this.player.y, range);
  }

  // ═══ ENEMIES ═══
  spawnEnemies(time) {
    if(time - this.lastSpawn < this.spawnInterval) return;
    this.lastSpawn = time;

    // Reduce spawn interval over time (harder), VS-style density ramp
    this.spawnInterval = Math.max(220, 1350 - this.gameTime*0.055);
    const elapsed = this.gameTime / 1000;
    const packSize = Phaser.Math.Clamp(1 + Math.floor(elapsed / 35), 1, 7);

    const enemyTypes = elapsed > 120
      ? ['veilshade','wraith','crawler','splitter','leech','brute']
      : elapsed > 60
        ? ['veilshade','wraith','crawler','splitter','leech']
        : ['veilshade','wraith','crawler'];

    const type = enemyTypes[Math.floor(Math.random()*enemyTypes.length)];
    const side = Math.floor(Math.random()*4);
    const baseOffset = Phaser.Math.Between(-40,40);

    for(let i=0; i<packSize; i++) {
      let x,y;
      const scatter = i * 18 + Phaser.Math.Between(-14,14);
      switch(side) {
        case 0: x=Phaser.Math.Clamp(GAME_W/2 + baseOffset + scatter, 0, GAME_W); y=-30-Phaser.Math.Between(0,80); break;
        case 1: x=GAME_W+30+Phaser.Math.Between(0,80); y=Phaser.Math.Clamp(GAME_H/2 + baseOffset + scatter, 80, GAME_H); break;
        case 2: x=Phaser.Math.Clamp(GAME_W/2 + baseOffset + scatter, 0, GAME_W); y=GAME_H+30+Phaser.Math.Between(0,80); break;
        default: x=-30-Phaser.Math.Between(0,80); y=Phaser.Math.Clamp(GAME_H/2 + baseOffset + scatter, 80, GAME_H);
      }
      this.createEnemy(x,y,type);
    }

    if(elapsed > 150 && !this.eliteSpawned.elderBrute) {
      this.eliteSpawned.elderBrute = true;
      this.showStageMessage('RIFT BRUTE ENTERS');
      this.createEnemy(GAME_W+60, GAME_H/2, 'brute');
    }
  }

  createEnemy(x,y,type) {
    const shadow = this.add.ellipse(0, 14, 22, 8, 0x000000, 0.30);
    const ring = this.add.circle(0, 0, 13, 0xffffff, 0);
    const g = this.add.graphics();
    let hp, speed, color, dmg, hpColor;

    switch(type) {
      case 'brute':
        hp = 90 + this.gameTime*0.010; speed=34; color=COLORS.red; dmg=18; hpColor = 0xff5544;
        ring.setStrokeStyle(3, COLORS.red, 0.60);
        g.lineStyle(3, 0xffa15d, 0.70);
        g.fillStyle(0x4a1020, 0.96);
        g.fillRoundedRect(-14,-16,28,32,6);
        g.strokeRoundedRect(-14,-16,28,32,6);
        g.fillStyle(0xffdd66, 0.95);
        g.fillRect(-7,-8,4,4);
        g.fillRect(3,-8,4,4);
        break;
      case 'splitter':
        hp = 11 + this.gameTime*0.002; speed=72; color=COLORS.orange; dmg=7; hpColor = 0xffbb55;
        ring.setStrokeStyle(2, COLORS.orange, 0.45);
        g.lineStyle(2, 0xffd37a, 0.55);
        g.fillStyle(0x55310f, 0.92);
        g.fillTriangle(-10,10, 10,10, 0,-13);
        g.strokeTriangle(-10,10, 10,10, 0,-13);
        g.fillStyle(0xfff1b3, 0.95);
        g.fillRect(-4,-5,3,3);
        g.fillRect(2,-5,3,3);
        break;
      case 'leech':
        hp = 10 + this.gameTime*0.0018; speed=78; color=COLORS.blue; dmg=5; hpColor = 0x66d8ff;
        ring.setStrokeStyle(2, COLORS.blue, 0.42);
        g.lineStyle(2, 0x9de1ff, 0.50);
        g.fillStyle(0x102a50, 0.92);
        g.fillEllipse(0, 0, 22, 17);
        g.strokeEllipse(0, 0, 22, 17);
        g.fillStyle(0xdff8ff, 0.95);
        g.fillRect(-5,-4,3,3);
        g.fillRect(3,-4,3,3);
        break;
      case 'veilshade':
        hp = 12 + this.gameTime*0.002; speed=60; color=COLORS.indigo; dmg=8; hpColor = 0xa26cff;
        ring.setStrokeStyle(2, COLORS.lavender, 0.45);
        g.lineStyle(2, 0xd9c1ff, 0.55);
        g.fillStyle(0x3a1c6d, 0.92);
        g.fillRoundedRect(-9,-12,18,24,5);
        g.strokeRoundedRect(-9,-12,18,24,5);
        g.fillStyle(0xf0deff, 0.95);
        g.fillRect(-5,-8,3,3);
        g.fillRect(2,-8,3,3);
        break;
      case 'wraith':
        hp = 8 + this.gameTime*0.0015; speed=90; color=COLORS.violet; dmg=6; hpColor = 0xff8cff;
        ring.setStrokeStyle(2, 0xf2c6ff, 0.42);
        g.lineStyle(2, 0xf6e8ff, 0.42);
        g.fillStyle(0xbfdcff, 0.84);
        g.fillRoundedRect(-8,-10,16,20,8);
        g.strokeRoundedRect(-8,-10,16,20,8);
        g.fillStyle(color, 0.95);
        g.fillRect(-3,-14,3,5);
        g.fillRect(0,-14,3,5);
        break;
      default: // crawler
        hp = 18 + this.gameTime*0.003; speed=45; color=COLORS.green; dmg=10; hpColor = 0x8cff5f;
        ring.setStrokeStyle(2, 0x97ff77, 0.35);
        g.lineStyle(2, 0x87cc5b, 0.45);
        g.fillStyle(0x114400, 0.95);
        g.fillRoundedRect(-10,-8,20,16,3);
        g.strokeRoundedRect(-10,-8,20,16,3);
        g.fillStyle(COLORS.orange, 0.95);
        g.fillRect(-6,-4,4,4);
        g.fillRect(2,-4,4,4);
    }

    const hpBg = this.add.rectangle(0, -18, 22, 4, 0x110a1a, 0.92).setStrokeStyle(1, 0xffffff, 0.12);
    const hpFill = this.add.rectangle(-10, -18, 20, 2, hpColor, 1).setOrigin(0,0.5);
    const container = this.add.container(x,y,[shadow, ring, g, hpBg, hpFill]);
    this.physics.world.enable(container);
    if(container.body) {
      container.body.setSize(20,20);
      container.body.setOffset(-10,-10);
    }
    container.hp = hp;
    container.maxHp = hp;
    container.speed = speed;
    container.enemyType = type;
    container.contactDamage = dmg;
    container.hpFill = hpFill;
    container.hpBg = hpBg;
    container.spriteGraphic = g;
    container.shadow = shadow;
    container.ring = ring;
    container.baseScale = type === 'crawler' ? 1.04 : 1.0;
    container.setScale(container.baseScale);

    this.enemies.add(container);
    return container;
  }

  updateEnemies(time, delta) {
    if(!this.enemies || !this.enemies.getChildren) return;
    this.enemies.getChildren().forEach(e => {
      let targetX = this.player.x, targetY = this.player.y;
      if(e.enemyType === 'leech') {
        let nearestGem = null, gd = Infinity;
        this.expGems.getChildren().forEach(g => {
          const d = Phaser.Math.Distance.Between(e.x,e.y,g.x,g.y);
          if(d < gd) { gd = d; nearestGem = g; }
        });
        if(nearestGem && gd < 180) { targetX = nearestGem.x; targetY = nearestGem.y; }
        if(nearestGem && gd < 14) {
          nearestGem.destroy();
          this.spawnDamageText(e.x, e.y-18, 'LEECH', COLORS.blue);
        }
      }
      const angle = Phaser.Math.Angle.Between(e.x,e.y,targetX,targetY);
      if(e.body && e.body.setVelocity) {
        e.body.setVelocity(Math.cos(angle)*e.speed, Math.sin(angle)*e.speed);
      }

      if(e.hpFill) {
        e.hpFill.width = 20 * Phaser.Math.Clamp(e.hp / e.maxHp, 0, 1);
      }

      if(e.enemyType === 'veilshade') {
        e.spriteGraphic.setAlpha(0.78 + Math.sin(time*0.01)*0.15);
        e.ring.setAlpha(0.35 + Math.sin(time*0.01)*0.12);
      } else if(e.enemyType === 'wraith') {
        e.ring.setScale(1 + Math.sin(time*0.012 + e.x*0.01) * 0.08);
      } else if(e.enemyType === 'crawler') {
        e.shadow.setAlpha(0.26 + Math.sin(time*0.016 + e.y*0.01) * 0.05);
      }
    });
  }

  damageEnemy(enemy, amount) {
    if(!enemy.active) return;
    enemy.hp -= amount;
    this.spawnDamageText(enemy.x, enemy.y-15, Math.round(amount), this.charData.color);
    sfx.hit();

    if(enemy.spriteGraphic) enemy.spriteGraphic.setAlpha(0.36);
    if(enemy.ring) enemy.ring.setAlpha(0.95);
    this.tweens.add({
      targets: enemy,
      scaleX: enemy.baseScale * 1.08,
      scaleY: enemy.baseScale * 1.08,
      duration: 60,
      yoyo: true,
      onComplete: () => {
        if(enemy.active) enemy.setScale(enemy.baseScale);
      }
    });
    this.time.delayedCall(60, () => {
      if(enemy.active && enemy.spriteGraphic) enemy.spriteGraphic.setAlpha(1);
    });

    if(enemy.hpFill) {
      enemy.hpFill.width = 20 * Phaser.Math.Clamp(enemy.hp / enemy.maxHp, 0, 1);
    }

    if(enemy.hp <= 0) {
      this.killEnemy(enemy);
    }
  }

  killEnemy(enemy) {
    const deadX = enemy.x;
    const deadY = enemy.y;
    const deadType = enemy.enemyType;
    // Spawn exp gem
    this.createExpGem(deadX, deadY);
    if(deadType === 'splitter') {
      for(let i=0;i<2;i++) {
        const child = this.createEnemy(deadX + Phaser.Math.Between(-18,18), deadY + Phaser.Math.Between(-18,18), 'wraith');
        if(child && child.body) child.body.setVelocity(Phaser.Math.Between(-80,80), Phaser.Math.Between(-80,80));
      }
    }
    this.score += 10;
    this.killCount++;
    sfx.enemyDeath();

    // Death particle burst
    for(let i=0;i<5;i++) {
      const burstColor = enemy.enemyType === 'crawler' ? COLORS.green : enemy.enemyType === 'wraith' ? COLORS.violet : COLORS.lavender;
      const p = this.add.rectangle(enemy.x, enemy.y, 3, 3, burstColor);
      const a = Math.random()*Math.PI*2;
      this.tweens.add({
        targets:p,
        x: enemy.x+Math.cos(a)*20,
        y: enemy.y+Math.sin(a)*20,
        alpha:0,
        duration:300,
        onComplete:()=>p.destroy()
      });
    }

    enemy.destroy();
  }

  onPlayerHit(player, enemy) {
    if(this.invulnerable) return;
    this.playerHp -= enemy.contactDamage;
    this.invulnerable = true;
    this.player.setAlpha(0.4);
    sfx.playerHit();

    this.time.delayedCall(500, () => {
      this.invulnerable = false;
      if(this.player && this.player.active) this.player.setAlpha(1);
    });

    this.cameras.main.shake(100, 0.005);

    if(this.playerHp <= 0) {
      this.endGame();
    }
  }

  // ═══ PROJECTILES ═══
  onProjectileHit(proj, enemy) {
    this.damageEnemy(enemy, proj.damage);
    proj.destroy();
  }

  onMineHit(mine, enemy) {
    if(!mine.active || !enemy.active) return;
    this.detonateMine(mine);
  }

  updateProjectiles(delta) {
    if(!this.projectiles || !this.projectiles.getChildren) return;
    this.projectiles.getChildren().forEach(p => {
      p.lifetime -= delta;
      if(p.prismProjectile) {
        const trail = this.add.circle(p.x, p.y, 5, COLORS.white, 0.08);
        this.tweens.add({
          targets: trail,
          alpha: 0,
          scaleX: 0.4,
          scaleY: 0.4,
          duration: 150,
          onComplete: () => trail.destroy()
        });
      }
      if(p.lifetime <= 0) p.destroy();
    });
  }

  // ═══ EXP GEMS ═══
  createExpGem(x,y) {
    const g = this.add.graphics();
    g.fillStyle(COLORS.lavender);
    g.fillCircle(0,0,4);
    g.fillStyle(COLORS.white);
    g.fillCircle(0,0,2);

    const container = this.add.container(x,y,[g]);
    this.physics.world.enable(container);
    if(container.body) {
      container.body.setSize(10,10);
      container.body.setOffset(-5,-5);
    }
    container.expValue = 2;

    this.expGems.add(container);
  }

  updateExpGems(delta) {
    this.expGems.getChildren().forEach(gem => {
      const d = Phaser.Math.Distance.Between(gem.x,gem.y,this.player.x,this.player.y);
      if(d < 130 + (this.magnetBonus || 0)) {
        // Magnetize toward player
        const angle = Phaser.Math.Angle.Between(gem.x,gem.y,this.player.x,this.player.y);
        if(gem.body && gem.body.setVelocity) gem.body.setVelocity(Math.cos(angle)*280, Math.sin(angle)*280);
      } else {
        if(gem.body && gem.body.setVelocity) gem.body.setVelocity(0,0);
      }
    });
  }

  onGemCollect(player, gem) {
    this.playerExp += gem.expValue;
    this.score += 5;
    gem.destroy();
    sfx.gem();

    if(this.playerExp >= this.expToNext) {
      this.levelUp();
    }
  }

  levelUp() {
    this.playerLevel++;
    this.playerExp -= this.expToNext;
    this.expToNext = Math.floor(this.expToNext * 1.4);
    this.playerMaxHp += 10;
    this.playerHp = Math.min(this.playerMaxHp, this.playerHp+10);
    sfx.levelUp();
    sfx.cardReveal();

    const flash = this.add.text(GAME_W/2, GAME_H/2 - 185, 'RELIC CARDS REVEALED', {
      fontFamily:'Georgia, serif',
      fontSize:'18px',
      fontStyle:'bold',
      color:'#f7e8b6',
      stroke:'#2d164e',
      strokeThickness:4
    }).setOrigin(0.5).setDepth(2000);
    this.tweens.add({targets: flash, alpha: 0, y: flash.y - 20, duration: 650, onComplete:()=>flash.destroy()});

    this.showUpgradeMenu();
  }

  // ═══ UPGRADE MENU ═══
  showUpgradeMenu() {
    this.upgradeMenuOpen = true;
    if(this.player && this.player.body) this.player.body.setVelocity(0,0);
    if (this.physics && this.physics.world) {
      this.physics.pause();
    }
    [this.enemies, this.projectiles, this.expGems].forEach(group => {
      if (!group) return;
      group.getChildren().forEach(obj => {
        if (obj.body && obj.body.setVelocity) obj.body.setVelocity(0, 0);
      });
    });

    const overlay = this.add.rectangle(0,0,GAME_W,GAME_H,0x03020a,0.88).setOrigin(0,0);
    const heroArtKey = gameState.selectedCharacter + '_full';
    const heroArt = this.textures.exists(heroArtKey)
      ? this.add.image(GAME_W/2, GAME_H/2 + 38, heroArtKey).setScale(0.48).setAlpha(0.10)
      : null;

    const panel = this.add.rectangle(GAME_W/2,GAME_H/2,472,360,0x0d0820,0.98)
      .setStrokeStyle(2,COLORS.gold,0.78);
    const inner = this.add.rectangle(GAME_W/2,GAME_H/2,456,344,0x120b22,0.94)
      .setStrokeStyle(1,COLORS.lavender,0.22);

    const title = this.add.text(GAME_W/2, GAME_H/2-144, '✦ PRISMATIC ASCENSION ✦', {
      fontFamily:'Georgia, serif', fontSize:'22px', fontStyle:'bold', color:'#f7e8b6', stroke:'#201132', strokeThickness:5
    }).setOrigin(0.5);

    const subtitle = this.add.text(GAME_W/2, GAME_H/2-114, 'Choose one relic and deepen your attunement', {
      fontFamily:'Trebuchet MS, Arial, sans-serif', fontSize:'12px', fontStyle:'bold', color:'#d8c0ff', stroke:'#000000', strokeThickness:2
    }).setOrigin(0.5);

    const upgrades = this.getRandomUpgrades(3);
    const elements = [overlay, panel, inner, title, subtitle];
    if (heroArt) elements.push(heroArt);

    const cardW = 140, cardH = 188, gap = 10;
    const totalW = upgrades.length * cardW + (upgrades.length-1) * gap;
    const startX = (GAME_W - totalW) / 2;

    upgrades.forEach((up, i) => {
      const x = startX + i*(cardW + gap);
      const y = GAME_H/2 - 66;
      const card = this.add.rectangle(x, y, cardW, cardH, 0x17102a, 0.98)
        .setOrigin(0,0)
        .setStrokeStyle(2, up.color, 0.98)
        .setInteractive({useHandCursor:true});
      const trim = this.add.rectangle(x+6, y+6, cardW-12, cardH-12, 0x0f0a1d, 0.82)
        .setOrigin(0,0)
        .setStrokeStyle(1, COLORS.gold, 0.28);
      const topBand = this.add.rectangle(x, y, cardW, 6, up.color, 0.98).setOrigin(0,0);
      const glyph = this.add.text(x+cardW/2, y+28, '◆', {
        fontFamily:'Georgia, serif', fontSize:'30px', fontStyle:'bold', color:'#'+up.color.toString(16).padStart(6,'0'), stroke:'#000000', strokeThickness:2
      }).setOrigin(0.5);
      const keyword = this.add.text(x+cardW/2, y+56, up.keyword, {
        fontFamily:'Trebuchet MS, Arial, sans-serif', fontSize:'10px', fontStyle:'bold', color:'#f7e8b6', stroke:'#000000', strokeThickness:2
      }).setOrigin(0.5);
      const name = this.add.text(x+cardW/2, y+88, up.name, {
        fontFamily:'Georgia, serif', fontSize:'15px', fontStyle:'bold', color:'#f3ecff', align:'center', stroke:'#000000', strokeThickness:3, wordWrap:{width: cardW-18}
      }).setOrigin(0.5);
      const desc = this.add.text(x+cardW/2, y+122, up.desc, {
        fontFamily:'Trebuchet MS, Arial, sans-serif', fontSize:'11px', fontStyle:'bold', color:'#d7c6ee', stroke:'#000000', strokeThickness:2, align:'center', wordWrap:{width: cardW-20}
      }).setOrigin(0.5);
      const action = this.add.text(x+cardW/2, y+cardH-18, 'ATTUNE', {
        fontFamily:'Georgia, serif', fontSize:'13px', fontStyle:'bold', color:'#f7e8b6', stroke:'#000000', strokeThickness:2
      }).setOrigin(0.5);

      card.on('pointerover', () => {
        card.setFillStyle(0x241442, 0.99);
        action.setColor('#ffffff');
        glyph.setScale(1.08);
      });
      card.on('pointerout', () => {
        card.setFillStyle(0x17102a, 0.98);
        action.setColor('#f7e8b6');
        glyph.setScale(1.0);
      });
      card.on('pointerdown', () => {
        sfx.select();
        up.apply();
        this.cleanupUpgradeMenu();
      });

      elements.push(card, trim, topBand, glyph, keyword, name, desc, action);
    });

    this.upgradeMenuElements = elements;
  }

  cleanupUpgradeMenu() {
    if(this.upgradeMenuElements) {
      this.upgradeMenuElements.forEach(el => { if(el && el.destroy) el.destroy(); });
    }
    this.upgradeMenuOpen = false;
    if (this.physics && this.physics.world && !this.gameOver) {
      this.physics.resume();
    }
  }

  getRandomUpgrades(count) {
    const pool = [
      {name:'Crimson Surge', keyword:'OFFENSE', color:COLORS.red, desc:'+20% attack damage',
       apply:()=>{this.attackDamageMult*=1.2;}},
      {name:'Emerald Drift', keyword:'MOTION', color:COLORS.green, desc:'+15% movement speed',
       apply:()=>{this.moveSpeedMult*=1.15;}},
      {name:'Solar Tempo', keyword:'RHYTHM', color:COLORS.yellow, desc:'+15% attack speed',
       apply:()=>{this.attackSpeedMult*=1.15;}},
      {name:'Azure Reach', keyword:'RANGE', color:COLORS.blue, desc:'+20% attack range',
       apply:()=>{this.attackRangeMult*=1.2;}},
      {name:'Amber Vitalis', keyword:'SURVIVAL', color:COLORS.orange, desc:'+25 max HP',
       apply:()=>{this.playerMaxHp+=25; this.playerHp+=25;}},
      {name:'Violet Renewal', keyword:'RESTORE', color:COLORS.violet, desc:'Heal 40 HP',
       apply:()=>{this.playerHp=Math.min(this.playerMaxHp,this.playerHp+40);}},

      {name:'Prism Shard +', keyword:'WEAPON', color:COLORS.blue, desc:'Upgrade Prism Shard',
       condition:()=>gameState.selectedCharacter==='prismel' && this.getWeaponLevel('prismShard') < 5,
       apply:()=>{this.upgradeWeapon('prismShard');}},
      {name:'Kinetic Drive +', keyword:'WEAPON', color:COLORS.green, desc:'Upgrade Kinetic Drive',
       condition:()=>gameState.selectedCharacter==='kineza' && this.getWeaponLevel('kineticDrive') < 5,
       apply:()=>{this.upgradeWeapon('kineticDrive');}},
      {name:'Aura Pulse +', keyword:'WEAPON', color:COLORS.yellow, desc:'Upgrade Aura Pulse',
       condition:()=>gameState.selectedCharacter==='auryi' && this.getWeaponLevel('auraPulse') < 5,
       apply:()=>{this.upgradeWeapon('auraPulse');}},
      {name:'Orbiting Prism', keyword:'WEAPON', color:COLORS.violet, desc:'Crystal satellite',
       condition:()=>this.getWeaponLevel('prismOrbit') < 5,
       apply:()=>{this.upgradeWeapon('prismOrbit');}},
      {name:'Veil Mine', keyword:'WEAPON', color:COLORS.lavender, desc:'Drop veil sigils',
       condition:()=>this.getWeaponLevel('veilMine') < 5,
       apply:()=>{this.upgradeWeapon('veilMine');}},
      {name:'Chain Spark', keyword:'WEAPON', color:COLORS.blue, desc:'Lightning jumps',
       condition:()=>this.getWeaponLevel('chainSpark') < 5,
       apply:()=>{this.upgradeWeapon('chainSpark');}},

      {name:'Magnet Charm', keyword:'PASSIVE', color:COLORS.lavender, desc:'Wider gem pickup',
       apply:()=>{this.addPassive('Magnet Charm');}},
      {name:'Spectrum Lens', keyword:'PASSIVE', color:COLORS.blue, desc:'Prism evolution key',
       apply:()=>{this.addPassive('Spectrum Lens');}},
      {name:'Momentum Core', keyword:'PASSIVE', color:COLORS.green, desc:'Dash evolution key',
       apply:()=>{this.addPassive('Momentum Core');}},
      {name:'Golden Halo', keyword:'PASSIVE', color:COLORS.yellow, desc:'Aura evolution key',
       apply:()=>{this.addPassive('Golden Halo');}},
      {name:'Vital Thread', keyword:'PASSIVE', color:COLORS.orange, desc:'Max HP + regen path',
       apply:()=>{this.addPassive('Vital Thread');}},
      {name:'Quickened Veil', keyword:'PASSIVE', color:COLORS.red, desc:'Faster weapon rhythm',
       apply:()=>{this.addPassive('Quickened Veil');}},
    ];

    const available = pool.filter(u => !u.condition || u.condition());
    const chosen = [];
    while(chosen.length < count && available.length) {
      const idx = Math.floor(Math.random()*available.length);
      const card = available.splice(idx,1)[0];
      const wrapped = {...card};
      const originalApply = wrapped.apply;
      wrapped.apply = () => {
        originalApply();
        this.tryEvolutions();
      };
      chosen.push(wrapped);
    }
    return chosen;
  }

  updateUI() {
    const charKey = gameState.selectedCharacter;
    const theme = HERO_UI_THEMES[charKey] || HERO_UI_THEMES.prismel;

    const hpPct = Math.max(0,this.playerHp/this.playerMaxHp);
    this.hpBarFill.width = (this.hpBarMaxWidth - 2) * hpPct;
    this.hpBarGloss.width = (this.hpBarMaxWidth - 2) * hpPct;
    this.hpBarFill.fillColor = hpPct>0.5 ? 0x44ff88 : hpPct>0.25 ? 0xffd84d : 0xff4d5e;
    this.hpText.setText(`${Math.max(0,Math.round(this.playerHp))} / ${this.playerMaxHp}`);
    if(hpPct <= 0.25) {
      const pulse = 0.65 + Math.sin(this.time.now*0.018)*0.28;
      this.hpBarFill.setAlpha(pulse);
      this.levelBadge.setScale(1 + Math.sin(this.time.now*0.018)*0.02);
    } else {
      this.hpBarFill.setAlpha(1);
      this.levelBadge.setScale(1);
    }

    const expPct = Phaser.Math.Clamp(this.playerExp/this.expToNext, 0, 1);
    this.expBarFill.width = (this.expBarMaxWidth - 2) * expPct;
    this.expBarFill.fillColor = theme.energyColor;
    this.expBarFill.setAlpha(0.86 + Math.sin(this.time.now*0.012)*0.08);

    this.levelText.setText('LV '+this.playerLevel);
    this.scoreText.setText('SCORE ' + this.score);
  }

  endGame() {
    this.gameOver = true;
    sfx.gameOver();
    gameState.score = this.score;
    gameState.killCount = this.killCount;
    gameState.gameTime = this.gameTime;
    this.scene.start('GameOver');
  }
}

// ═══════════════════════════════════════════════════════
// GAME OVER SCENE
// ═══════════════════════════════════════════════════════
class GameOverScene extends Phaser.Scene {
  constructor() {
    super('GameOver');
  }

  create() {
    this.add.rectangle(0,0,GAME_W,GAME_H,COLORS.void).setOrigin(0,0);

    this.add.text(GAME_W/2, 200, 'THE VEIL CLAIMS YOU', {
      fontFamily:'Georgia, serif', fontSize:'24px', fontStyle:'bold', color:'#ff4444'
    }).setOrigin(0.5);

    const totalSec = Math.floor(gameState.gameTime/1000);
    const min = Math.floor(totalSec/60);
    const sec = totalSec%60;

    this.add.text(GAME_W/2, 280, `Survived: ${min}:${sec.toString().padStart(2,'0')}`, {
      fontFamily:'Courier New', fontSize:'14px', color:'#c8a8ff'
    }).setOrigin(0.5);

    this.add.text(GAME_W/2, 310, `Enemies Defeated: ${gameState.killCount}`, {
      fontFamily:'Courier New', fontSize:'14px', color:'#c8a8ff'
    }).setOrigin(0.5);

    this.add.text(GAME_W/2, 340, `Score: ${gameState.score}`, {
      fontFamily:'Courier New', fontSize:'16px', fontStyle:'bold', color:'#ffd700'
    }).setOrigin(0.5);

    const btn = this.add.rectangle(GAME_W/2, 440, 200, 50, 0x1a0a3e)
      .setStrokeStyle(2, COLORS.lavender)
      .setInteractive({useHandCursor:true});

    this.add.text(GAME_W/2, 440, 'TRY AGAIN', {
      fontFamily:'Georgia, serif', fontSize:'16px', fontStyle:'bold', color:'#c8a8ff'
    }).setOrigin(0.5);

    btn.on('pointerover', ()=>btn.setStrokeStyle(2,COLORS.gold));
    btn.on('pointerout', ()=>btn.setStrokeStyle(2,COLORS.lavender));
    btn.on('pointerdown', ()=>{ sfx.select(); this.scene.start('CharacterSelect'); });
  }
}

// ═══════════════════════════════════════════════════════
// GAME CONFIG
// ═══════════════════════════════════════════════════════
const config = {
  type: Phaser.CANVAS,
  width: GAME_W,
  height: GAME_H,
  parent: 'game-container',
  backgroundColor: '#07060f',
  render: { pixelArt: true, antialias: false, roundPixels: true, antialiasGL: false },
  audio: {
    disableWebAudio: false
  },
  physics: {
    default: 'arcade',
    arcade: { debug: false }
  },
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: GAME_W,
    height: GAME_H
  },
  scene: [TitleScene, CharacterSelectScene, BattleScene, GameOverScene]
};

new Phaser.Game(config);
const __pvLoading = document.getElementById('loading');
if (__pvLoading) __pvLoading.style.display = 'none';

</script>
